name: Skel syntax proposal
description: Propose a change to the Skel language or its semantics.
title: "[Skel proposal]: "
labels: [language, proposal]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Explain the domain-modeling problem that cannot be expressed clearly today.
    validations:
      required: true
  - type: textarea
    id: syntax
    attributes:
      label: Proposed syntax
      render: text
    validations:
      required: true
  - type: textarea
    id: semantics
    attributes:
      label: Semantics
      description: Describe validation rules and effects on every relevant generator.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and migration
      description: Explain how existing contracts and generated consumers are affected.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
