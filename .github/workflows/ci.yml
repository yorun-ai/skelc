name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Check module metadata
        run: GOWORK=off go mod tidy -diff

      - name: Test with race detector
        run: GOWORK=off go test -race ./...

      - name: Run go vet
        run: GOWORK=off go vet ./...

      - name: Exercise quickstart
        run: ./examples/quickstart/generate.sh "$RUNNER_TEMP/skelc-quickstart"
